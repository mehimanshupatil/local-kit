<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Top shine -->
  <rect width="512" height="256" rx="110" fill="url(#shine)"/>

  <!--
    Toolbox icon — centered at (256, 256)
    Handle: outer r=120, inner r=50 → 70 px thick arch
    Body: 332 × 220 px, rounded 28 px
    Bounding box: x 90–422, y 86–426 → center (256, 256)
  -->

  <!-- Handle arch (U-shape above body) -->
  <path d="M 136,206 A 120,120 0 0 1 376,206 L 306,206 A 50,50 0 0 0 206,206 Z" fill="white"/>

  <!-- Body -->
  <rect x="90" y="206" width="332" height="220" rx="28" fill="white"/>

  <!-- Lid divider line (clipped to body width, inset to avoid corner bleed) -->
  <rect x="118" y="288" width="276" height="10" rx="5" fill="#0369a1" opacity="0.18"/>

  <!-- Centre latch bump -->
  <rect x="216" y="282" width="80" height="22" rx="9" fill="#0369a1" opacity="0.22"/>
</svg>
